name: GitHub pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Use a single shared concurrency group so all runs that write to gh-pages are
# serialised. A per-ref group (e.g. preview-${{ github.ref }}) only serialises
# within the same ref, allowing concurrent writes from different events (push vs
# PR) to race and cause "remote contains work not present locally" conflicts.
# cancel-in-progress: false ensures every queued run still executes.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Generate documentation and push to Github pages.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-
      - name: Install dependencies
        run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Build documentation
        run: npm run docs
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./docs
          commit_message: ":memo: Update docs ${{ github.event.head_commit.message }}"
